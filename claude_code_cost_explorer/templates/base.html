<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Claude Code Costs{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           font-size: 14px; color: #1a1a1a; background: #f5f5f5; }
    header { background: #2d2d2d; color: #fff; padding: 12px 24px;
             display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 16px; font-weight: 600; }
    header a { color: #ccc; text-decoration: none; font-size: 13px; }
    header a:hover { color: #fff; }
    main { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
    table { width: 100%; border-collapse: collapse; background: #fff;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    th { background: #f0f0f0; font-weight: 600; text-align: left;
         padding: 10px 14px; border-bottom: 1px solid #e0e0e0; color: #555; }
    td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .cost { font-variant-numeric: tabular-nums; font-family: monospace; }
    .tokens { font-family: monospace; color: #666; font-size: 13px; }
    .summary-bar { background: #fff; border-radius: 8px; padding: 14px 18px;
                   margin-bottom: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.1);
                   display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
    .metric { display: flex; flex-direction: column; }
    .metric-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .05em; }
    .metric-value { font-size: 20px; font-weight: 700; font-family: monospace; }
    .filter-form { background: #fff; border-radius: 8px; padding: 12px 16px;
                   margin-bottom: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.1);
                   display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .filter-form label { font-size: 13px; color: #555; }
    .filter-form input[type=date] { padding: 6px 10px; border: 1px solid #ccc;
                                    border-radius: 4px; font-size: 13px; }
    .filter-form button { padding: 6px 14px; background: #0066cc; color: #fff;
                          border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .filter-form button:hover { background: #005bb5; }
    .filter-form .clear { color: #666; font-size: 13px; }
    .back-link { margin-bottom: 16px; display: block; font-size: 13px; }
    .model-tag { display: inline-block; padding: 2px 7px; border-radius: 10px;
                 font-size: 11px; font-weight: 600; background: #e8f0fe; color: #1a56db; }
    .prompt-preview { color: #777; font-size: 12px; max-width: 300px;
                      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/" style="color:inherit">Claude Code Costs</a></h1>
    {% block breadcrumb %}{% endblock %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
